name: Release

# Builds the bootstrap apt-transport-kyc .deb for amd64 + arm64 and
# uploads to the same kyc-releases R2 bucket the kyc release pipeline
# writes to. Two release cadences are kept separate by design:
#
#   - know-your-code releases (frequent) write to
#     apt/pool/main/k/kyc/kyc_<v>_<arch>.deb
#   - this repo's releases (rare — only when the transport changes)
#     write to apt/install/apt-transport-kyc_<v>_<arch>.deb
#
# The bootstrap .deb is what users install before adding the apt
# source — it can't be license-gated, so it's served publicly by the
# apt worker at `/install/`.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (vX.Y.Z), or 'dry-run' for a no-publish build"
        required: true
        default: dry-run

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
      publishing: ${{ steps.plan.outputs.publishing }}
      version-label: ${{ steps.plan.outputs.version-label }}
    steps:
      - id: plan
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$INPUT_TAG" == "dry-run" ]]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "publishing=false" >> "$GITHUB_OUTPUT"
            echo "version-label=dry-run-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! [[ "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$INPUT_TAG' is not a valid v<semver>." >&2
            exit 1
          fi
          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "publishing=true" >> "$GITHUB_OUTPUT"
          echo "version-label=$INPUT_TAG" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.arch }})
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
            cc: ""
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compile toolchain
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          CC_aarch64_unknown_linux_gnu: ${{ matrix.cc }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cc }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install cargo-deb
        run: cargo install --locked --version 2.10.0 cargo-deb

      - name: Build .deb
        id: deb
        shell: bash
        run: |
          set -euo pipefail
          cargo deb --no-build --no-strip \
                    --target ${{ matrix.target }}
          DEB=$(ls target/${{ matrix.target }}/debian/apt-transport-kyc_*_${{ matrix.arch }}.deb)
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          sha256sum "$DEB" > "$DEB.sha256"
          dpkg-deb --info "$DEB"
          dpkg-deb --contents "$DEB"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-deb-${{ matrix.arch }}
          path: |
            ${{ steps.deb.outputs.deb }}
            ${{ steps.deb.outputs.deb }}.sha256
          if-no-files-found: error

  publish-r2:
    name: publish-r2 (.deb)
    needs:
      - plan
      - build
    if: ${{ needs.plan.outputs.publishing == 'true' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      R2_BUCKET: kyc-releases
    steps:
      - name: Check R2 credentials
        id: check
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_ENDPOINT" ]; then
            echo "::warning::R2 secrets not configured; skipping upload."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download .deb artifacts
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-deb-*
          path: deb
          merge-multiple: true

      - name: Upload .debs to R2 pool (bootstrap suite)
        if: steps.check.outputs.skip != 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          # Two-suite design: apt-transport-kyc is the unlicensed
          # bootstrap that gives apt the kyc:// scheme. It lives under
          # the bootstrap suite's pool, which the worker serves over
          # plain HTTPS with no license check.
          for f in deb/apt-transport-kyc_*.deb deb/apt-transport-kyc_*.deb.sha256; do
            base=$(basename "$f")
            aws s3 cp "$f" "s3://${R2_BUCKET}/apt/pool/bootstrap/main/a/apt-transport-kyc/${base}" \
              --endpoint-url "$R2_ENDPOINT" --no-progress
          done

  # Regenerate signed apt repo metadata for the `bootstrap` suite after
  # publish-r2 uploads the new .debs. Downloads any older versions
  # from R2 so they stay in the index, then runs apt-ftparchive +
  # GPG-signs Release with the CI-resident subkey (same trust anchor
  # as the kyc release pipeline — see SECURITY.md).
  apt-repo-bootstrap:
    name: apt-repo (bootstrap suite)
    needs:
      - plan
      - publish-r2
    if: ${{ needs.plan.outputs.publishing == 'true' && needs.publish-r2.result == 'success' }}
    runs-on: ubuntu-22.04
    env:
      R2_BUCKET: kyc-releases
      SUITE: bootstrap
      COMPONENTS: main
      ARCHITECTURES: amd64 arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check secrets present
        id: check
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
          APT_SIGNING_SUBKEY_ASC_BASE64: ${{ secrets.APT_SIGNING_SUBKEY_ASC_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_ENDPOINT" ] || [ -z "$APT_SIGNING_SUBKEY_ASC_BASE64" ]; then
            echo "::warning::R2 or GPG-signing secrets not configured; skipping apt-repo metadata refresh."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install apt-ftparchive + gpg
        if: steps.check.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y apt-utils gpg

      - name: Sync existing pool from R2
        if: steps.check.outputs.skip != 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          mkdir -p pool/main/a/apt-transport-kyc
          aws s3 sync "s3://${R2_BUCKET}/apt/pool/bootstrap/main/a/apt-transport-kyc/" pool/main/a/apt-transport-kyc/ \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude '*' --include '*.deb' \
            --no-progress || true
          ls -la pool/main/a/apt-transport-kyc/ || true

      - name: Build + sign apt repo metadata
        if: steps.check.outputs.skip != 'true'
        shell: bash
        env:
          APT_SIGNING_SUBKEY_ASC_BASE64: ${{ secrets.APT_SIGNING_SUBKEY_ASC_BASE64 }}
          APT_SIGNING_SUBKEY_PASSPHRASE: ${{ secrets.APT_SIGNING_SUBKEY_PASSPHRASE }}
          POOL_DIR: ./pool
          OUT_DIR: ./out
        run: ./apt-repo/build.sh --sign --ci

      - name: Upload signed metadata to R2
        if: steps.check.outputs.skip != 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          for f in out/dists/${SUITE}/main/binary-*/Packages \
                   out/dists/${SUITE}/main/binary-*/Packages.gz; do
            rel="${f#out/}"
            aws s3 cp "$f" "s3://${R2_BUCKET}/apt/${rel}" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type 'text/plain' \
              --no-progress
          done
          for f in out/dists/${SUITE}/Release out/dists/${SUITE}/Release.gpg out/dists/${SUITE}/InRelease; do
            if [ -f "$f" ]; then
              rel="${f#out/}"
              aws s3 cp "$f" "s3://${R2_BUCKET}/apt/${rel}" \
                --endpoint-url "$R2_ENDPOINT" \
                --content-type 'text/plain' \
                --no-progress
            fi
          done
